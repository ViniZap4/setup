unbind r
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded." \; refresh-client

set-option -g default-command "exec /bin/zsh -l"

set -g prefix C-b

set -g mouse on


# smart pane switching with awareness of vim splits
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-l) || tmux select-pane -R"

# use vim-like keys for splits and windows
bind-key v split-window -h;
bind-key s split-window -v;


bind-key [ copy-mode
bind-key ] paste-buffer


# set position to top
set-option -g status-position top

set -g base-index 1

# Toggle status bar on/off with Prefix + b
bind-key b if -F "#{==:#{status},on}" \
    "set-option -g status off" \
    "set-option -g status on" \; refresh-client

# start off
set-option -g status off

# copy-mode

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode 'y' send -X copy-pipe-and-cancel "pbcopy"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux' 
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'jaclu/tmux-menus'

set -g default-terminal "tmux-256color"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"

# Load catppuccin
# For TPM, instead use `run ~/.tmux/plugins/tmux/catppuccin.tmux`
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# set window settings 
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_status 'no'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_fill 'number'
set -g @catppuccin_window_current_text '#W'

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

set -g set-titles-string '-'
set -g set-titles off

# unbind your old key
unbind o

# full‑screen window version
bind o new-window -n "session-switcher" \
    "tmux list-sessions \
     | sed -E 's/:.*\$//' \
     | grep -v \"^$(tmux display-message -p '#S')\$\" \
     | fzf --reverse \
     | xargs tmux switch-client -t"

# …or as a popup (tmux ≥3.2):
bind o display-popup -E \
    "tmux list-sessions \
     | sed -E 's/:.*\$//' \
     | grep -v \"^$(tmux display-message -p '#S')\$\" \
     | fzf --reverse \
     | xargs tmux switch-client -t"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
